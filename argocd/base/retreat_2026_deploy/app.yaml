apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retreat-2026-deploy-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:sixfeetup/retreat-2026-deploy.git
    targetRevision: main
    path: k8s/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: retreat-2026-deploy-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
    - CreateNamespace=true
